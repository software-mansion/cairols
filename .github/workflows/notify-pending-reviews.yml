name: 'Notify about pending review requests'

on:
  schedule:
    # Monday to Friday at 06:00 UTC.
    - cron: '0 6 * * 1-5'
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Run script and send message to Slack
        env:
          # Needs access to read repos and orgs in the repos that are targeted in the script
          GH_TOKEN: ${{ secrets.REVIEW_REMINDER_GH_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_REVIEW_REMINDER_WEBHOOK_URL }}
        run: ./scripts/notify_pending_reviews.sh
